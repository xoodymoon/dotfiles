monitor=eDP-1, 1920x1080@75, auto, 1.2

$terminal = kitty
$menu = rofi -show drun

env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Catppuccin-Mocha-Mauve-Cursors
env = GTK_THEME,Catppuccin-Mocha-Standard-Mauve-Dark

input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
    accel_profile = flat

	touchpad {
	        natural_scroll = true
	        scroll_factor = 0.3
	    }

}

# Look n feel

general {
    gaps_in = 2
    gaps_out = 5
    border_size = 1
    col.active_border = rgba(cba6f7ff) rgba(89b4faff) 45deg
    col.inactive_border = rgba(313244ff)
    layout = dwindle
}

decoration {
    rounding = 10
    blur {
        enabled = true
        size = 6
        passes = 3
        new_optimizations = true
        xray = false
        noise = 0.02
        contrast = 1.0
        brightness = 1.0
        vibrancy = 0.2
        vibrancy_darkness = 0.5
    }
    shadow {
        enabled = false
        range = 10
        render_power = 2
        color = rgba(1a1a2ebb)
    }
}
# Animations
animations {
    enabled = true

    bezier = wind, 0.05, 0.9, 0.1, 1.0
    bezier = winIn, 0.1, 1.0, 0.1, 1.0
    bezier = winOut, 0.3, -0.3, 0, 1
    bezier = liner, 1, 1, 1, 1
    bezier = smooth, 0.4, 0.0, 0.2, 1.0

	animation = windows, 1, 2, smooth, slide
	animation = windowsIn, 1, 2, smooth, slide
	animation = windowsOut, 1, 2, winOut, slide
	animation = windowsMove, 1, 2, smooth, slide
	animation = border, 1, 10, liner
	animation = borderangle, 1, 100, liner, loop
	animation = fade, 1, 2, smooth
	animation = workspaces, 1, 2, smooth, slide
}

dwindle {
    pseudotile = true
    preserve_split = true
}

# Bindings

$mainMod = SUPER

bind = $mainMod, Return, exec, $terminal
bind = $mainMod, Q, killactive
bind = $mainMod, M, exit
bind = $mainMod, E, exec, nautilus
bind = $mainMod, V, togglefloating
bind = $mainMod, SPACE, exec, $menu
bind = $mainMod, F, fullscreen

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bind = , XF86AudioRaiseVolume, exec, pamixer -i 5
bind = , XF86AudioLowerVolume, exec, pamixer -d 5
bind = , XF86AudioMute, exec, pamixer -t
bind = , XF86MonBrightnessUp, exec, brightnessctl set 10%+
bind = , XF86MonBrightnessDown, exec, brightnessctl set 10%-


bind = SUPER ALT, SPACE, exec, wallpaper-pick
bind = , Print, exec, flameshot gui
bind = SUPER SHIFT, RETURN, exec, [float;center] kitty

# Auto-run

exec-once = waybar
exec-once = swaync
exec-once = hyprpaper
exec-once = eww daemon && eww open clock
exec-once = wayscriber --daemon
exec-once = hyprshade on vibrance
exec = hyprshade on vibrance
